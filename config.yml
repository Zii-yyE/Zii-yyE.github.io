baseURL: 'https://Zii-yyE.github.io/'
defaultContentLanguage: academic
theme: 'papermod'

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
          - - '\['
            - '\]'
          - - $$
            - $$
          inline:
          - - '\('
            - '\)'
        enable: true

params:
  defaultTheme: auto 
  socialIcons:
    - name: email
      url: "mailto:ziyewang0324@gmail.com"
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=your-google-scholar-id"
    - name: bluesky
      url: "https://bsky.app/profile/ziiyye.bsky.social"
  math: true

languages:
  academic:
    languageName: "Academic"
    weight: 1
    title: "Ziye Wang"
    
    menu:
      main:
        - identifier: about
          name: About
          url: /about/
          weight: 1
        - identifier: publications
          name: Publications
          url: /publications/
          weight: 2
        - identifier: research-radar
          name: Research Radar
          url: /research-radar/
          weight: 3

    params:
      profileMode:
        enabled: true
        title: "Ziye Wang"
        subtitle: "<span style='font-size: 0.9rem; color: grey;'>Evolutionary Genomics, Statistical Genomics</span>"
        imageUrl: "/me.jpeg"      
        imageWidth: 180             
        imageHeight: 180             
        imageTitle: "My Avatar"
        buttons:
          - name: About
            url: "/about/"
          - name: CV
            url: "/cv.pdf"

  personal:
    languageName: "Personal"
    weight: 2
    title: "Ziye Wang"
    
    menu:
      main:
        - identifier: about
          name: About
          url: /about/
          weight: 1
        - identifier: resources
          name: Resources
          url: /resources/
          weight: 2

    params:
      author: "Ziye Wang"
      profileMode:
        enabled: true
        title: "Ziye Wang"
        subtitle: "Notes, references, and other interesting things.<br><span style='font-size: 0.9rem; color: grey;'>The less formal side of the homepage.</span>"
        imageUrl: "/me.jpeg"      
        imageWidth: 180             
        imageHeight: 180             
        imageTitle: "Portrait"
        buttons:
          - name: About
            url: "/personal/about/"
          - name: Resources
            url: "/personal/resources/"
            
