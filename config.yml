baseURL: 'https://zii-yye.github.io/'
defaultContentLanguage: academic
disableLanguages:
  - personal
theme: 'papermod'

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
          - - '\['
            - '\]'
          - - $$
            - $$
          inline:
          - - '\('
            - '\)'
        enable: true

params:
  description: "Ziye Wang is a PhD student in Computational Biology at UC Berkeley working on population genetics, evolutionary genomics, phylogenetics, and pangenome methods."
  defaultTheme: auto 
  socialIcons:
    - name: email
      url: "mailto:ziyewang0324@gmail.com"
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=kh1J30YAAAAJ"
    - name: bluesky
      url: "https://bsky.app/profile/ziiyye.bsky.social"
    - name: github
      url: "https://github.com/Zii-yyE"
  math: true

languages:
  academic:
    languageName: "Academic"
    weight: 1
    title: "Ziye Wang"
    
    menu:
      main:
        - identifier: about
          name: About
          url: /about/
          weight: 1
        - identifier: publications
          name: Publications
          url: /publications/
          weight: 2

    params:
      profileMode:
        enabled: true
        title: "Ziye Wang"
        subtitle: >
          <span style="font-size: 1.2rem; color: var(--primary);">
            PhD student in Computational Biology, UC Berkeley
          </span>
          <br>
          <span style="font-size: 0.95rem; color: var(--secondary);">
            Population Genetics · Evolutionary Genomics · Phylogenetics
          </span>
        imageUrl: "/me.jpeg"      
        imageWidth: 200             
        imageHeight: 200             
        imageTitle: "My Avatar"
        buttons:
          - name: About
            url: "/about/"
          - name: CV
            url: "/cv.pdf"

  personal:
    languageName: "Personal"
    weight: 2
    title: "Ziye Wang"
    
    menu:
      main:
        - identifier: about
          name: About
          url: /about/
          weight: 1
        - identifier: resources
          name: Resources
          url: /resources/
          weight: 2

    params:
      author: "Ziye Wang"
      profileMode:
        enabled: true
        title: "Ziye Wang"
        subtitle: "Notes, references, and other interesting things.<br><span style='font-size: 0.9rem; color: grey;'>The less formal side of the homepage.</span>"
        imageUrl: "/me.jpeg"      
        imageWidth: 180             
        imageHeight: 180             
        imageTitle: "Portrait"
        buttons:
          - name: About
            url: "/personal/about/"
          - name: Resources
            url: "/personal/resources/"
            
